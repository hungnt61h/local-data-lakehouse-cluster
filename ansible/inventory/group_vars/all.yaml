domain: dp.com

k8s_major_version: "1.35"
k8s_version_rpm: "{{ k8s_major_version }}.1"

# kube-vip
k8s_vip: "192.168.0.29"
vip_interface: "ens160"
kube_vip_image: "ghcr.io/kube-vip/kube-vip:v1.0.4"

# cluster networking
firewalld_cidr_zone: trusted
pod_cidr: "10.244.0.0/16"
service_cidr: "10.96.0.0/12"
k8s_vip_service_ip: "10.96.0.1"

calico_version: "v3.31.3"

firewalld_enabled: true
firewalld_zone: public

firewalld_ports_all:
  - { port: "10250", proto: "tcp" }          # kubelet
  - { port: "4443", proto: "tcp" }           # kubelet
  - { port: "4789",  proto: "udp" }          # Calico VXLAN
  - { port: "30000-32767", proto: "tcp" }    # NodePort range
  - { port: "5473", proto: "tcp" }           # Calico Node port
  - { port: "9443", proto: "tcp" }           # MetalLB Pool
  - { port: "443", proto: "tcp" }            # HAProxy
  - { port: "80", proto: "tcp" }             # HAProxy
  - { port: "9000", proto: "tcp" }           # MinIO API
  - { port: "9001", proto: "tcp" }           # MinIO Console
  - { port: "9092-9094", proto: "tcp" }      # Kafka external broker ports via HAProxy TCP
  - { port: "8081-8083", proto: "tcp" }      # Schema Registry / Flink REST (8081)
  - { port: "8030", proto: "tcp" }           # StarRocks FE HTTP
  - { port: "9030", proto: "tcp" }           # StarRocks FE SQL
  - { port: "9020", proto: "tcp" }           # StarRocks FE Thrift
  - { port: "8090", proto: "tcp" }           # Gravitino API / UI
  - { port: "8080", proto: "tcp" }           # Airflow Webserver
  - { port: "5555", proto: "tcp" }           # Airflow Flower

# Optional: only needed when Flink/Spark ports are exposed directly on node network
# (for example hostNetwork/hostPort). Keep disabled for normal in-cluster traffic.
firewalld_enable_flink_spark_direct_ports: false
firewalld_ports_flink_spark_direct:
  - { port: "4040-4050", proto: "tcp" }      # Spark driver UIs
  - { port: "6123-6125", proto: "tcp" }      # Flink JobManager RPC/Blob/Query

# Optional: services (usually not needed for k8s, but here for completeness)
firewalld_services_all: []

# Optional: rich rules (LAN-restricted examples)
firewalld_rich_rules_all: []

# MinIO
minio_mode: distributed
minio_replicas: "{{ groups['workers'] | length }}"
# MinIO role auto-installs local-path provisioner if this class is missing.
minio_persistence_storage_class: "local-path"
minio_ingress_enabled: true
minio_ingress_class_name: "haproxy"
minio_ingress_host: "minio.{{ domain }}"
# Keep HTTP by default; enable TLS only after provisioning a cert with SAN=minio.dp.com.
minio_ingress_tls_enabled: false
minio_console_ingress_enabled: true
minio_console_ingress_class_name: "haproxy"
minio_console_ingress_host: "minio-console.{{ domain }}"
# Keep HTTP by default; enable TLS only after provisioning a cert with SAN=minio-console.dp.com.
minio_console_ingress_tls_enabled: false

# Apache Kafka
# Set this to your Kubernetes cluster DNS suffix if not `cluster.local`.
apache_kafka_cluster_domain: "cluster.local"

# Gravitino metadata backend (MySQL with 5Gi PVC)
gravitino_metadata_mysql_enabled: true
gravitino_metadata_mysql_storage_size: 5Gi
gravitino_metadata_mysql_storage_class_name: local-path
gravitino_metadata_mysql_root_password: "gravitino-root"
gravitino_metadata_mysql_user: "gravitino"
gravitino_metadata_mysql_password: "gravitino"
gravitino_metadata_mysql_gravitino_database: "gravitino"
gravitino_metadata_mysql_iceberg_rest_database: "gravitino_iceberg_rest"
gravitino_entity_jdbc_url: "jdbc:mysql://gravitino-mysql.gravitino.svc.cluster.local:3306/gravitino?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
gravitino_entity_jdbc_driver: "com.mysql.cj.jdbc.Driver"
gravitino_entity_jdbc_user: "gravitino"
gravitino_entity_jdbc_password: "gravitino"

# Gravitino Iceberg REST metadata on the same MySQL instance.
gravitino_iceberg_rest_catalog_backend: jdbc
gravitino_iceberg_rest_persistence_enabled: false
gravitino_iceberg_rest_warehouse: "s3://gravitino/iceberg/"
gravitino_iceberg_rest_io_impl: "org.apache.iceberg.aws.s3.S3FileIO"
gravitino_iceberg_rest_additional_config_items:
  gravitino.iceberg-rest.uri: "jdbc:mysql://gravitino-mysql.gravitino.svc.cluster.local:3306/gravitino_iceberg_rest?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  gravitino.iceberg-rest.jdbc-driver: "com.mysql.cj.jdbc.Driver"
  gravitino.iceberg-rest.jdbc-user: "gravitino"
  gravitino.iceberg-rest.jdbc-password: "gravitino"
  gravitino.iceberg-rest.jdbc-initialize: "true"
gravitino_iceberg_rest_init_script: |
  echo "Override config."
  cp /tmp/conf/* ${GRAVITINO_HOME}/conf
  MYSQL_JDBC_JAR="${GRAVITINO_HOME}/libs/mysql-connector-j-8.0.33.jar"
  if [ ! -f "${MYSQL_JDBC_JAR}" ]; then
    echo "Downloading MySQL JDBC driver..."
    curl -fsSL --retry 5 --retry-delay 2 -o "${MYSQL_JDBC_JAR}" "https://repo1.maven.org/maven2/com/mysql/mysql-connector-j/8.0.33/mysql-connector-j-8.0.33.jar"
  fi
  echo "Start the Gravitino Iceberg Rest Catalog Server"
  /bin/bash ${GRAVITINO_HOME}/bin/gravitino-iceberg-rest-server.sh run

# Airflow custom image (public Docker Hub)
airflow_image_repository: "hungnt61h/airflow"
airflow_image_tag: "3.1.7"
airflow_version: "3.1.7"
airflow_helm_reset_values: false

containerd_config_path: /etc/containerd

