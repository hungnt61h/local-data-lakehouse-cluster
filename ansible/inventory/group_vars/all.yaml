          65343766616139353634646236643961626431376636386132353763396664356234353866323737
          3464636536373361373963333139646532323831643361380a326438613666346361343762396435
          33356637343339313163316631323262363164636332343864666266363237326635353061353435
          3933376131306437330a306537623166666565323530383831666336366137303065303138306533
          3738

ansible_become_password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          65343766616139353634646236643961626431376636386132353763396664356234353866323737
          3464636536373361373963333139646532323831643361380a326438613666346361343762396435
          33356637343339313163316631323262363164636332343864666266363237326635353061353435
