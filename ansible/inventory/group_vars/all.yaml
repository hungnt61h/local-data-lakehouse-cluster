services:
  - headlamp
  - airflow
  - minio
  - gravitino
  - gravitino-iceberg-rest
  - starrocks
  - minio-console
  - minio
  - kafka
  - schema-registry
  - metabase

haproxy_ingress_ip: 192.168.0.200

# HAProxy TCP forwarding for Schema Registry, Apache Kafka brokers, and StarRocks FE SQL.
haproxy_ingress_extra_args:
  - "--configmap-tcp-services={{ haproxy_ingress_namespace | default('ingress-controller') }}/haproxy-tcp-services"
haproxy_ingress_service_tcp_ports:
  - { name: "schema-registry", port: 8081, targetPort: 8081 }
  - { name: "kafka-0", port: 9092, targetPort: 9092 }
  - { name: "kafka-1", port: 9093, targetPort: 9093 }
  - { name: "kafka-2", port: 9094, targetPort: 9094 }
  - { name: "starrocks-fe-sql", port: 9030, targetPort: 9030 }
