- name: Ensure helm is available
  ansible.builtin.command: helm version --short
  register: metabase_helm_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Ensure kubectl is available
  ansible.builtin.command: kubectl version --client
  register: metabase_kubectl_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Validate Metabase database settings
  ansible.builtin.assert:
    that:
    - metabase_database_type in ['h2', 'postgres']
    - >-
      (metabase_database_type != 'postgres')
      or
      (metabase_database_host | trim | length > 0)
    - >-
      (metabase_database_type != 'postgres')
      or
      (metabase_database_port | int > 0)
    - metabase_database_name | trim | length > 0
    - metabase_database_user | trim | length > 0
    - metabase_database_password | trim | length > 0
    fail_msg: Metabase database settings are incomplete.
  when: inventory_hostname == first_cp

- name: Ensure Metabase namespace exists
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    create namespace {{ metabase_namespace }}
  register: metabase_namespace_create
  failed_when: >-
    metabase_namespace_create.rc != 0
    and 'AlreadyExists' not in metabase_namespace_create.stderr
  changed_when: "'created' in metabase_namespace_create.stdout"
  when: inventory_hostname == first_cp

- name: Render Metabase PostgreSQL manifest
  ansible.builtin.template:
    src: metabase-postgresql.yaml.j2
    dest: /root/metabase-postgresql.yaml
    mode: "0600"
  when:
  - inventory_hostname == first_cp
  - metabase_metadata_postgresql_enabled | bool

- name: Apply Metabase PostgreSQL manifest
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    apply -f /root/metabase-postgresql.yaml
  register: metabase_postgresql_apply
  changed_when: >-
    'created' in metabase_postgresql_apply.stdout
    or 'configured' in metabase_postgresql_apply.stdout
    or 'patched' in metabase_postgresql_apply.stdout
  when:
  - inventory_hostname == first_cp
  - metabase_metadata_postgresql_enabled | bool

- name: Wait for Metabase PostgreSQL StatefulSet rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ metabase_namespace }}
    rollout status statefulset/{{ metabase_metadata_postgresql_statefulset_name }}
    --timeout={{ metabase_rollout_timeout }}
  register: metabase_postgresql_rollout
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - metabase_metadata_postgresql_enabled | bool

- name: Add or update Metabase Helm repository
  ansible.builtin.command: >-
    helm repo add {{ metabase_repo_name }} {{ metabase_repo_url }} --force-update
  register: metabase_repo_add
  changed_when: >-
    'has been added' in metabase_repo_add.stdout
    or 'has been updated' in metabase_repo_add.stdout
  when: inventory_hostname == first_cp

- name: Update Helm repository index for Metabase chart
  ansible.builtin.command: helm repo update {{ metabase_repo_name }}
  register: metabase_repo_update
  changed_when: false
  when: inventory_hostname == first_cp

- name: Render Metabase values file
  ansible.builtin.template:
    src: metabase-values.yaml.j2
    dest: /root/metabase-values.yaml
    mode: "0600"
  when: inventory_hostname == first_cp

- name: Install or upgrade Metabase
  ansible.builtin.command: >-
    helm upgrade --install {{ metabase_release_name }} {{ metabase_chart_ref }}
    --namespace {{ metabase_namespace }}
    --create-namespace
    --version {{ metabase_chart_version }}
    -f /root/metabase-values.yaml
    --wait
    --timeout {{ metabase_helm_timeout }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: metabase_install
  changed_when: >-
    'has been installed' in metabase_install.stdout
    or 'has been upgraded' in metabase_install.stdout
  when: inventory_hostname == first_cp

- name: Wait for Metabase deployment rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ metabase_namespace }}
    rollout status deployment/{{ metabase_deployment_name }}
    --timeout={{ metabase_rollout_timeout }}
  register: metabase_rollout
  changed_when: false
  when: inventory_hostname == first_cp

- name: Render Metabase bootstrap job manifest
  ansible.builtin.template:
    src: metabase-bootstrap-job.yaml.j2
    dest: /root/metabase-bootstrap-job.yaml
    mode: "0600"
  when:
  - inventory_hostname == first_cp
  - metabase_bootstrap_enabled | bool

- name: Delete existing Metabase bootstrap job
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ metabase_namespace }}
    delete job/{{ metabase_bootstrap_job_name }} --ignore-not-found=true
  register: metabase_bootstrap_job_delete
  changed_when: "'deleted' in metabase_bootstrap_job_delete.stdout"
  when:
  - inventory_hostname == first_cp
  - metabase_bootstrap_enabled | bool

- name: Apply Metabase bootstrap job
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    apply -f /root/metabase-bootstrap-job.yaml
  register: metabase_bootstrap_job_apply
  changed_when: >-
    'created' in metabase_bootstrap_job_apply.stdout
    or 'configured' in metabase_bootstrap_job_apply.stdout
    or 'patched' in metabase_bootstrap_job_apply.stdout
  when:
  - inventory_hostname == first_cp
  - metabase_bootstrap_enabled | bool

- name: Wait for Metabase bootstrap job to complete
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ metabase_namespace }}
    wait --for=condition=complete job/{{ metabase_bootstrap_job_name }}
    --timeout={{ metabase_bootstrap_job_timeout }}
  register: metabase_bootstrap_job_wait
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - metabase_bootstrap_enabled | bool

- name: Show Metabase bootstrap job logs
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ metabase_namespace }}
    logs job/{{ metabase_bootstrap_job_name }} --tail=200
  register: metabase_bootstrap_job_logs
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - metabase_bootstrap_enabled | bool

- name: Show Metabase bootstrap job log output
  ansible.builtin.debug:
    var: metabase_bootstrap_job_logs.stdout_lines
  when:
  - inventory_hostname == first_cp
  - metabase_bootstrap_enabled | bool

- name: Show Metabase service details
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ metabase_namespace }}
    get svc {{ metabase_service_name }} -o wide
  register: metabase_service
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show Metabase service output
  ansible.builtin.debug:
    var: metabase_service.stdout_lines
  when: inventory_hostname == first_cp

- name: Show Metabase PostgreSQL services
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ metabase_namespace }}
    get svc {{ metabase_metadata_postgresql_service_name }} -o wide
  register: metabase_postgresql_services
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - metabase_metadata_postgresql_enabled | bool

- name: Show Metabase PostgreSQL service output
  ansible.builtin.debug:
    var: metabase_postgresql_services.stdout_lines
  when:
  - inventory_hostname == first_cp
  - metabase_metadata_postgresql_enabled | bool

- name: Show Metabase pods
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ metabase_namespace }}
    get pods -l app=metabase -o wide
  register: metabase_pods
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show Metabase pod output
  ansible.builtin.debug:
    var: metabase_pods.stdout_lines
  when: inventory_hostname == first_cp

- name: Show Metabase ingress resources
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ metabase_namespace }}
    get ingress -l app=metabase,release={{ metabase_release_name }} -o wide
  register: metabase_ingress
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - metabase_ingress_enabled | bool

- name: Show Metabase ingress output
  ansible.builtin.debug:
    var: metabase_ingress.stdout_lines
  when:
  - inventory_hostname == first_cp
  - metabase_ingress_enabled | bool
