- name: Ensure helm is available
  ansible.builtin.command: helm version --short
  register: metallb_helm_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Ensure kubectl is available
  ansible.builtin.command: kubectl version --client
  register: metallb_kubectl_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Add or update MetalLB Helm repository
  ansible.builtin.command: >-
    helm repo add {{ metallb_repo_name }} {{ metallb_repo_url }} --force-update
  register: metallb_repo_add
  changed_when: >-
    'has been added' in metallb_repo_add.stdout
    or 'has been updated' in metallb_repo_add.stdout
  when: inventory_hostname == first_cp

- name: Update Helm repository index for MetalLB
  ansible.builtin.command: helm repo update {{ metallb_repo_name }}
  register: metallb_repo_update
  changed_when: false
  when: inventory_hostname == first_cp

- name: Install or upgrade MetalLB
  ansible.builtin.command: >-
    helm upgrade --install {{ metallb_release_name }} {{ metallb_chart_ref }}
    --namespace {{ metallb_namespace }}
    --create-namespace
    --wait
    --timeout {{ metallb_helm_timeout }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: metallb_install
  changed_when: >-
    'has been installed' in metallb_install.stdout
    or 'has been upgraded' in metallb_install.stdout
  when: inventory_hostname == first_cp

- name: Wait for MetalLB controller rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ metallb_namespace }}
    rollout status deployment/{{ metallb_release_name }}-controller
    --timeout={{ metallb_rollout_timeout }}
  register: metallb_controller_rollout
  changed_when: false
  when: inventory_hostname == first_cp

- name: Wait for MetalLB speaker rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ metallb_namespace }}
    rollout status daemonset/{{ metallb_release_name }}-speaker
    --timeout={{ metallb_rollout_timeout }}
  register: metallb_speaker_rollout
  changed_when: false
  when: inventory_hostname == first_cp

- name: Render MetalLB pool configuration
  ansible.builtin.template:
    src: metallb-pool.yaml.j2
    dest: /root/metallb-pool.yaml
    mode: "0600"
  when: inventory_hostname == first_cp

- name: Apply MetalLB pool configuration
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    apply -f /root/metallb-pool.yaml
  register: metallb_pool_apply
  changed_when: >-
    'configured' in metallb_pool_apply.stdout
    or 'created' in metallb_pool_apply.stdout
  when: inventory_hostname == first_cp

- name: Show configured MetalLB address pools
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ metallb_namespace }}
    get ipaddresspools.metallb.io
  register: metallb_pools
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show MetalLB address pools output
  ansible.builtin.debug:
    var: metallb_pools.stdout_lines
  when: inventory_hostname == first_cp
