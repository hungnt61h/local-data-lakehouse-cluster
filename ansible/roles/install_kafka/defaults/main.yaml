apache_kafka_namespace: kafka
apache_kafka_statefulset_name: kafka
apache_kafka_headless_service_name: kafka-headless
apache_kafka_bootstrap_service_name: kafka
apache_kafka_broker_replicas: 3
apache_kafka_cluster_domain: cluster.local

apache_kafka_image_repository: apache/kafka
apache_kafka_image_tag: "4.2.0"
apache_kafka_image_pull_policy: IfNotPresent

# Use a stable cluster id for KRaft metadata formatting.
apache_kafka_cluster_id: "MkU3OEVBNTcwNTJENDM2Qk"

apache_kafka_storage_class: local-path
apache_kafka_storage_size: 20Gi
apache_kafka_storage_access_mode: ReadWriteOnce

apache_kafka_internal_listener_port: 9092
apache_kafka_controller_listener_port: 9093
apache_kafka_external_container_port: 19092

apache_kafka_external_enabled: true
apache_kafka_external_host: "kafka.{{ domain }}"
apache_kafka_external_port_start: 9092

apache_kafka_haproxy_tcp_enabled: true
apache_kafka_haproxy_tcp_configmap_name: haproxy-tcp-services
apache_kafka_haproxy_namespace: "{{ haproxy_ingress_namespace | default('ingress-controller') }}"

apache_kafka_rollout_timeout: 15m

apache_kafka_schema_registry_enabled: true
apache_kafka_schema_registry_deployment_name: schema-registry
apache_kafka_schema_registry_service_name: schema-registry
apache_kafka_schema_registry_image_repository: confluentinc/cp-schema-registry
apache_kafka_schema_registry_image_tag: "7.8.0"
apache_kafka_schema_registry_image_pull_policy: IfNotPresent
apache_kafka_schema_registry_port: 8081
apache_kafka_schema_registry_topic_replication_factor: 3
apache_kafka_schema_registry_enable_service_links: false
apache_kafka_schema_registry_external_enabled: true
apache_kafka_schema_registry_external_port: 8081
apache_kafka_schema_registry_ingress_enabled: true
apache_kafka_schema_registry_ingress_class_name: haproxy
apache_kafka_schema_registry_ingress_host: "schema-registry.{{ domain }}"
apache_kafka_schema_registry_ingress_path: /
apache_kafka_schema_registry_ingress_annotations: {}
apache_kafka_schema_registry_ingress_tls_enabled: false
apache_kafka_schema_registry_ingress_tls_secret_name: schema-registry-tls

apache_kafka_node_selector: {}
apache_kafka_tolerations: []
apache_kafka_affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: node-role.kubernetes.io/control-plane
          operator: DoesNotExist
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector:
        matchExpressions:
        - key: app
          operator: In
          values:
          - kafka
      topologyKey: kubernetes.io/hostname
