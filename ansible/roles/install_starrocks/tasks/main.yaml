- name: Ensure helm is available
  ansible.builtin.command: helm version --short
  register: starrocks_helm_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Ensure kubectl is available
  ansible.builtin.command: kubectl version --client
  register: starrocks_kubectl_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Validate StarRocks MinIO integration settings
  ansible.builtin.assert:
    that:
    - starrocks_minio_endpoint_internal | trim | length > 0
    - starrocks_minio_access_key | trim | length > 0
    - starrocks_minio_secret_key | trim | length > 0
    - starrocks_minio_bucket | trim | length > 0
    fail_msg: StarRocks MinIO integration settings are incomplete.
  when:
  - inventory_hostname == first_cp
  - starrocks_minio_enabled | bool

- name: Ensure StarRocks namespace exists
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    create namespace {{ starrocks_namespace }}
  register: starrocks_namespace_create
  failed_when: >-
    starrocks_namespace_create.rc != 0
    and 'AlreadyExists' not in starrocks_namespace_create.stderr
  changed_when: "'created' in starrocks_namespace_create.stdout"
  when: inventory_hostname == first_cp

- name: Render StarRocks MinIO bucket bootstrap job manifest
  ansible.builtin.template:
    src: starrocks-minio-bucket-job.yaml.j2
    dest: /root/starrocks-minio-bucket-job.yaml
    mode: "0600"
  when:
  - inventory_hostname == first_cp
  - starrocks_minio_enabled | bool
  - starrocks_minio_auto_create_bucket | bool

- name: Delete existing StarRocks MinIO bucket bootstrap job
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ starrocks_namespace }}
    delete job/{{ starrocks_minio_bucket_job_name }} --ignore-not-found=true
  register: starrocks_minio_bucket_job_delete
  changed_when: "'deleted' in starrocks_minio_bucket_job_delete.stdout"
  when:
  - inventory_hostname == first_cp
  - starrocks_minio_enabled | bool
  - starrocks_minio_auto_create_bucket | bool

- name: Apply StarRocks MinIO bucket bootstrap job
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    apply -f /root/starrocks-minio-bucket-job.yaml
  register: starrocks_minio_bucket_job_apply
  changed_when: >-
    'created' in starrocks_minio_bucket_job_apply.stdout
    or 'configured' in starrocks_minio_bucket_job_apply.stdout
    or 'patched' in starrocks_minio_bucket_job_apply.stdout
  when:
  - inventory_hostname == first_cp
  - starrocks_minio_enabled | bool
  - starrocks_minio_auto_create_bucket | bool

- name: Wait for StarRocks MinIO bucket bootstrap job to complete
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ starrocks_namespace }}
    wait --for=condition=complete job/{{ starrocks_minio_bucket_job_name }}
    --timeout={{ starrocks_minio_bucket_job_timeout }}
  register: starrocks_minio_bucket_job_wait
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - starrocks_minio_enabled | bool
  - starrocks_minio_auto_create_bucket | bool

- name: Add or update StarRocks Helm repository
  ansible.builtin.command: >-
    helm repo add {{ starrocks_repo_name }} {{ starrocks_repo_url }} --force-update
  register: starrocks_repo_add
  changed_when: >-
    'has been added' in starrocks_repo_add.stdout
    or 'has been updated' in starrocks_repo_add.stdout
  when: inventory_hostname == first_cp

- name: Update Helm repository index for StarRocks chart
  ansible.builtin.command: helm repo update {{ starrocks_repo_name }}
  register: starrocks_repo_update
  changed_when: false
  when: inventory_hostname == first_cp

- name: Render StarRocks values file
  ansible.builtin.template:
    src: starrocks-values.yaml.j2
    dest: /root/starrocks-values.yaml
    mode: "0600"
  when: inventory_hostname == first_cp

- name: Install or upgrade StarRocks (shared-data mode)
  ansible.builtin.command: >-
    helm upgrade --install {{ starrocks_release_name }} {{ starrocks_chart_ref }}
    --namespace {{ starrocks_namespace }}
    --create-namespace
    --version {{ starrocks_chart_version }}
    -f /root/starrocks-values.yaml
    --wait
    --timeout {{ starrocks_helm_timeout }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: starrocks_install
  changed_when: >-
    'has been installed' in starrocks_install.stdout
    or 'has been upgraded' in starrocks_install.stdout
  when: inventory_hostname == first_cp

- name: Wait for StarRocks FE StatefulSet rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ starrocks_namespace }}
    rollout status statefulset/{{ starrocks_cluster_name }}-fe
    --timeout={{ starrocks_rollout_timeout }}
  register: starrocks_fe_rollout
  changed_when: false
  when: inventory_hostname == first_cp

- name: Wait for StarRocks CN StatefulSet rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ starrocks_namespace }}
    rollout status statefulset/{{ starrocks_cluster_name }}-cn
    --timeout={{ starrocks_rollout_timeout }}
  register: starrocks_cn_rollout
  changed_when: false
  when: inventory_hostname == first_cp

- name: Render StarRocks FE ingress manifest
  ansible.builtin.template:
    src: starrocks-fe-ingress.yaml.j2
    dest: /root/starrocks-fe-ingress.yaml
    mode: "0600"
  when:
  - inventory_hostname == first_cp
  - starrocks_ingress_enabled | bool

- name: Apply StarRocks FE ingress manifest
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    apply -f /root/starrocks-fe-ingress.yaml
  register: starrocks_ingress_apply
  changed_when: >-
    'created' in starrocks_ingress_apply.stdout
    or 'configured' in starrocks_ingress_apply.stdout
    or 'patched' in starrocks_ingress_apply.stdout
  when:
  - inventory_hostname == first_cp
  - starrocks_ingress_enabled | bool

- name: Check HAProxy namespace availability
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    get namespace {{ starrocks_haproxy_namespace }} -o name --ignore-not-found
  register: starrocks_haproxy_namespace_status
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - starrocks_haproxy_tcp_enabled | bool

- name: Check HAProxy TCP services ConfigMap availability
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ starrocks_haproxy_namespace }}
    get configmap {{ starrocks_haproxy_tcp_configmap_name }} -o name --ignore-not-found
  register: starrocks_haproxy_tcp_configmap_status
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - starrocks_haproxy_tcp_enabled | bool
  - starrocks_haproxy_namespace_status.stdout | trim | length > 0

- name: Create HAProxy TCP services ConfigMap for StarRocks SQL
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ starrocks_haproxy_namespace }}
    create configmap {{ starrocks_haproxy_tcp_configmap_name }}
    --from-literal={{ starrocks_haproxy_sql_external_port }}={{ starrocks_namespace }}/{{ starrocks_cluster_name }}-fe-service:{{ starrocks_fe_query_port }}
  register: starrocks_haproxy_tcp_configmap_create
  changed_when: "'created' in starrocks_haproxy_tcp_configmap_create.stdout"
  when:
  - inventory_hostname == first_cp
  - starrocks_haproxy_tcp_enabled | bool
  - starrocks_haproxy_namespace_status.stdout | trim | length > 0
  - starrocks_haproxy_tcp_configmap_status.stdout | trim | length == 0

- name: Patch HAProxy TCP services ConfigMap for StarRocks SQL
  ansible.builtin.shell: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ starrocks_haproxy_namespace }}
    patch configmap {{ starrocks_haproxy_tcp_configmap_name }}
    --type merge
    --patch '{{ {"data": {(starrocks_haproxy_sql_external_port | string): (starrocks_namespace ~ "/" ~ starrocks_cluster_name ~ "-fe-service:" ~ (starrocks_fe_query_port | string))}} | to_json }}'
  args:
    executable: /bin/bash
  register: starrocks_haproxy_tcp_configmap_patch
  changed_when: "'patched' in starrocks_haproxy_tcp_configmap_patch.stdout"
  when:
  - inventory_hostname == first_cp
  - starrocks_haproxy_tcp_enabled | bool
  - starrocks_haproxy_namespace_status.stdout | trim | length > 0
  - starrocks_haproxy_tcp_configmap_status.stdout | trim | length > 0

- name: Show StarRocks services
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ starrocks_namespace }}
    get svc -o wide
  register: starrocks_services
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show StarRocks service output
  ansible.builtin.debug:
    var: starrocks_services.stdout_lines
  when: inventory_hostname == first_cp

- name: Show StarRocks pods
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ starrocks_namespace }}
    get pods -o wide
  register: starrocks_pods
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show StarRocks pod output
  ansible.builtin.debug:
    var: starrocks_pods.stdout_lines
  when: inventory_hostname == first_cp

- name: Show StarRocks ingress resources
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ starrocks_namespace }}
    get ingress -o wide
  register: starrocks_ingress
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - starrocks_ingress_enabled | bool

- name: Show StarRocks ingress output
  ansible.builtin.debug:
    var: starrocks_ingress.stdout_lines
  when:
  - inventory_hostname == first_cp
  - starrocks_ingress_enabled | bool
