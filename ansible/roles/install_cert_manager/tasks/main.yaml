- name: Ensure helm is available
  ansible.builtin.command: helm version --short
  register: cert_manager_helm_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Ensure kubectl is available
  ansible.builtin.command: kubectl version --client
  register: cert_manager_kubectl_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Add or update cert-manager Helm repository
  ansible.builtin.command: >-
    helm repo add {{ cert_manager_repo_name }} {{ cert_manager_repo_url }} --force-update
  register: cert_manager_repo_add
  changed_when: >-
    'has been added' in cert_manager_repo_add.stdout
    or 'has been updated' in cert_manager_repo_add.stdout
  when: inventory_hostname == first_cp

- name: Update Helm repository index for cert-manager chart
  ansible.builtin.command: helm repo update {{ cert_manager_repo_name }}
  register: cert_manager_repo_update
  changed_when: false
  when: inventory_hostname == first_cp

- name: Render cert-manager values file
  ansible.builtin.template:
    src: cert-manager-values.yaml.j2
    dest: /root/cert-manager-values.yaml
    mode: "0600"
  when: inventory_hostname == first_cp

- name: Install or upgrade cert-manager
  ansible.builtin.command: >-
    helm upgrade --install {{ cert_manager_release_name }} {{ cert_manager_chart_ref }}
    --namespace {{ cert_manager_namespace }}
    --create-namespace
    -f /root/cert-manager-values.yaml
    --wait
    --timeout {{ cert_manager_helm_timeout }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: cert_manager_install
  changed_when: >-
    'has been installed' in cert_manager_install.stdout
    or 'has been upgraded' in cert_manager_install.stdout
  when: inventory_hostname == first_cp

- name: Wait for cert-manager CRDs
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    wait --for=condition=Established
    crd/certificates.cert-manager.io
    crd/issuers.cert-manager.io
    crd/clusterissuers.cert-manager.io
    --timeout={{ cert_manager_crd_wait_timeout }}
  register: cert_manager_crd_wait
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - cert_manager_crds_enabled

- name: Wait for cert-manager controller rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ cert_manager_namespace }}
    rollout status deployment/{{ cert_manager_release_name }}
    --timeout={{ cert_manager_rollout_timeout }}
  register: cert_manager_controller_rollout
  changed_when: false
  when: inventory_hostname == first_cp

- name: Wait for cert-manager webhook rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ cert_manager_namespace }}
    rollout status deployment/{{ cert_manager_release_name }}-webhook
    --timeout={{ cert_manager_rollout_timeout }}
  register: cert_manager_webhook_rollout
  changed_when: false
  when: inventory_hostname == first_cp

- name: Wait for cert-manager cainjector rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ cert_manager_namespace }}
    rollout status deployment/{{ cert_manager_release_name }}-cainjector
    --timeout={{ cert_manager_rollout_timeout }}
  register: cert_manager_cainjector_rollout
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show cert-manager pods
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ cert_manager_namespace }}
    get pods -o wide
  register: cert_manager_pods
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show cert-manager pod output
  ansible.builtin.debug:
    var: cert_manager_pods.stdout_lines
  when: inventory_hostname == first_cp
