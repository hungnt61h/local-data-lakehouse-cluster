- name: Ensure kubectl is available
  ansible.builtin.command: kubectl version --client
  register: metrics_server_kubectl_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Install or upgrade metrics-server components
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    apply -f {{ metrics_server_manifest_url }}
  register: metrics_server_apply
  changed_when: >-
    'created' in metrics_server_apply.stdout
    or 'configured' in metrics_server_apply.stdout
  retries: "{{ metrics_server_apply_retries | int }}"
  delay: "{{ metrics_server_apply_delay | int }}"
  until: metrics_server_apply.rc == 0
  when: inventory_hostname == first_cp

- name: Render metrics-server deployment patch
  ansible.builtin.template:
    src: metrics-server-deployment-patch.yaml.j2
    dest: /root/metrics-server-deployment-patch.yaml
    mode: "0600"
  when: inventory_hostname == first_cp

- name: Patch metrics-server deployment options
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ metrics_server_namespace }}
    patch deployment metrics-server --type=strategic
    --patch-file /root/metrics-server-deployment-patch.yaml
  register: metrics_server_patch
  changed_when: >-
    'patched' in metrics_server_patch.stdout
    and '(no change)' not in metrics_server_patch.stdout
  when: inventory_hostname == first_cp

- name: Wait for metrics-server deployment rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ metrics_server_namespace }}
    rollout status deployment/metrics-server --timeout={{ metrics_server_rollout_timeout }}
  register: metrics_server_rollout
  changed_when: false
  when: inventory_hostname == first_cp

- name: Wait for metrics APIService availability
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    wait --for=condition=Available apiservice/v1beta1.metrics.k8s.io --timeout=5m
  register: metrics_server_apiservice_wait
  changed_when: false
  when: inventory_hostname == first_cp

- name: Verify metrics API by querying node metrics
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf top nodes
  register: metrics_server_top_nodes
  changed_when: false
  retries: 20
  delay: 10
  until: metrics_server_top_nodes.rc == 0
  when: inventory_hostname == first_cp

- name: Show metrics-server node metrics
  ansible.builtin.debug:
    var: metrics_server_top_nodes.stdout_lines
  when: inventory_hostname == first_cp
