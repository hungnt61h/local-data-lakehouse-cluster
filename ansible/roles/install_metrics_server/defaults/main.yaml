metrics_server_namespace: kube-system
metrics_server_manifest_url: https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

# Follow common workaround for kubelet SAN / hostname issues in homelab clusters.
metrics_server_host_network: true
metrics_server_secure_port: 4443
metrics_server_metric_resolution: 15s
metrics_server_kubelet_preferred_address_types: InternalIP,ExternalIP,Hostname
metrics_server_kubelet_use_node_status_port: true
metrics_server_kubelet_insecure_tls: true

metrics_server_apply_retries: 6
metrics_server_apply_delay: 10
metrics_server_rollout_timeout: 2m
