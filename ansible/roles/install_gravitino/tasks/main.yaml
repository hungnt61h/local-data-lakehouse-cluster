- name: Ensure helm is available
  ansible.builtin.command: helm version --short
  register: gravitino_helm_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Ensure kubectl is available
  ansible.builtin.command: kubectl version --client
  register: gravitino_kubectl_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Ensure git is available
  ansible.builtin.command: git --version
  register: gravitino_git_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Validate Gravitino ingress settings
  ansible.builtin.assert:
    that:
    - gravitino_ingress_host | trim | length > 0
    fail_msg: Gravitino ingress host must not be empty when ingress is enabled.
  when:
  - inventory_hostname == first_cp
  - gravitino_ingress_enabled | bool

- name: Validate Gravitino Iceberg REST ingress settings
  ansible.builtin.assert:
    that:
    - gravitino_iceberg_rest_ingress_host | trim | length > 0
    fail_msg: Gravitino Iceberg REST ingress host must not be empty when ingress is enabled.
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool
  - gravitino_iceberg_rest_ingress_enabled | bool

- name: Validate Gravitino MinIO integration settings
  ansible.builtin.assert:
    that:
    - gravitino_minio_access_key | trim | length > 0
    - gravitino_minio_secret_key | trim | length > 0
    - gravitino_minio_endpoint_internal | trim | length > 0
    - gravitino_minio_bucket | trim | length > 0
    fail_msg: Gravitino MinIO integration settings are incomplete.
  when:
  - inventory_hostname == first_cp
  - gravitino_minio_enabled | bool

- name: Validate Gravitino MinIO job toggles
  ansible.builtin.assert:
    that:
    - (not gravitino_minio_auto_create_bucket | bool) or (gravitino_minio_enabled | bool)
    fail_msg: Gravitino MinIO bootstrap jobs require gravitino_minio_enabled=true.
  when: inventory_hostname == first_cp

- name: Validate Gravitino persistence settings
  ansible.builtin.assert:
    that:
    - gravitino_persistence_size | trim | length > 0
    - gravitino_persistence_access_modes | length > 0
    - gravitino_persistence_existing_claim | trim | length > 0
    fail_msg: Gravitino persistence settings are incomplete.
  when:
  - inventory_hostname == first_cp
  - gravitino_persistence_enabled | bool

- name: Ensure Gravitino namespace exists
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    create namespace {{ gravitino_namespace }}
  register: gravitino_namespace_create
  failed_when: >-
    gravitino_namespace_create.rc != 0
    and 'AlreadyExists' not in gravitino_namespace_create.stderr
  changed_when: "'created' in gravitino_namespace_create.stdout"
  when: inventory_hostname == first_cp

- name: Ensure Gravitino Iceberg REST namespace exists
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    create namespace {{ gravitino_iceberg_rest_namespace }}
  register: gravitino_iceberg_rest_namespace_create
  failed_when: >-
    gravitino_iceberg_rest_namespace_create.rc != 0
    and 'AlreadyExists' not in gravitino_iceberg_rest_namespace_create.stderr
  changed_when: "'created' in gravitino_iceberg_rest_namespace_create.stdout"
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool
  - gravitino_iceberg_rest_namespace != gravitino_namespace

- name: Validate Gravitino metadata MySQL settings
  ansible.builtin.assert:
    that:
    - gravitino_metadata_mysql_name | trim | length > 0
    - gravitino_metadata_mysql_service_name | trim | length > 0
    - gravitino_metadata_mysql_storage_size | trim | length > 0
    - gravitino_metadata_mysql_root_password | trim | length > 0
    - gravitino_metadata_mysql_user | trim | length > 0
    - gravitino_metadata_mysql_password | trim | length > 0
    - gravitino_metadata_mysql_gravitino_database | trim | length > 0
    - gravitino_metadata_mysql_iceberg_rest_database | trim | length > 0
    fail_msg: Gravitino metadata MySQL settings are incomplete.
  when:
  - inventory_hostname == first_cp
  - gravitino_metadata_mysql_enabled | bool

- name: Ensure Gravitino metadata MySQL storage class exists
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    get storageclass {{ gravitino_metadata_mysql_storage_class_name }}
  register: gravitino_metadata_mysql_storage_class_check
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - gravitino_metadata_mysql_enabled | bool
  - gravitino_metadata_mysql_storage_class_name | trim | length > 0

- name: Render Gravitino metadata MySQL manifest
  ansible.builtin.template:
    src: gravitino-mysql.yaml.j2
    dest: /root/gravitino-mysql.yaml
    mode: "0600"
  when:
  - inventory_hostname == first_cp
  - gravitino_metadata_mysql_enabled | bool

- name: Apply Gravitino metadata MySQL manifest
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    apply -f /root/gravitino-mysql.yaml
  register: gravitino_metadata_mysql_apply
  changed_when: >-
    'created' in gravitino_metadata_mysql_apply.stdout
    or 'configured' in gravitino_metadata_mysql_apply.stdout
    or 'patched' in gravitino_metadata_mysql_apply.stdout
  when:
  - inventory_hostname == first_cp
  - gravitino_metadata_mysql_enabled | bool

- name: Wait for Gravitino metadata MySQL rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_metadata_mysql_namespace }}
    rollout status statefulset/{{ gravitino_metadata_mysql_name }}
    --timeout={{ gravitino_metadata_mysql_rollout_timeout }}
  register: gravitino_metadata_mysql_rollout
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - gravitino_metadata_mysql_enabled | bool

- name: Ensure Gravitino Iceberg REST MySQL metadata database exists
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_metadata_mysql_namespace }}
    exec {{ gravitino_metadata_mysql_name }}-0 --
    mysql -uroot -p{{ gravitino_metadata_mysql_root_password }}
    -e "CREATE DATABASE IF NOT EXISTS {{ gravitino_metadata_mysql_gravitino_database }};
    CREATE DATABASE IF NOT EXISTS {{ gravitino_metadata_mysql_iceberg_rest_database }};
    GRANT ALL PRIVILEGES ON {{ gravitino_metadata_mysql_gravitino_database }}.* TO '{{ gravitino_metadata_mysql_user }}'@'%';
    GRANT ALL PRIVILEGES ON {{ gravitino_metadata_mysql_iceberg_rest_database }}.* TO '{{ gravitino_metadata_mysql_user }}'@'%';
    FLUSH PRIVILEGES;"
  register: gravitino_metadata_mysql_restdb_apply
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - gravitino_metadata_mysql_enabled | bool

- name: Ensure Gravitino chart checkout parent directory exists
  ansible.builtin.file:
    path: "{{ gravitino_chart_checkout_path | dirname }}"
    state: directory
    mode: "0755"
  when: inventory_hostname == first_cp

- name: Checkout Gravitino chart sources
  ansible.builtin.git:
    repo: "{{ gravitino_chart_git_repo }}"
    dest: "{{ gravitino_chart_checkout_path }}"
    version: "{{ gravitino_chart_git_version }}"
    single_branch: true
    depth: 1
    update: true
  when: inventory_hostname == first_cp

- name: Ensure Gravitino chart path exists
  ansible.builtin.stat:
    path: "{{ gravitino_chart_path }}"
  register: gravitino_chart_path_stat
  when: inventory_hostname == first_cp

- name: Ensure Gravitino Iceberg REST chart path exists
  ansible.builtin.stat:
    path: "{{ gravitino_iceberg_rest_chart_path }}"
  register: gravitino_iceberg_rest_chart_path_stat
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool

- name: Validate Gravitino chart path
  ansible.builtin.assert:
    that:
    - gravitino_chart_path_stat.stat.exists
    - gravitino_chart_path_stat.stat.isdir
    fail_msg: Gravitino chart path is missing at {{ gravitino_chart_path }}.
  when: inventory_hostname == first_cp

- name: Validate Gravitino Iceberg REST chart path
  ansible.builtin.assert:
    that:
    - gravitino_iceberg_rest_chart_path_stat.stat.exists
    - gravitino_iceberg_rest_chart_path_stat.stat.isdir
    fail_msg: Gravitino Iceberg REST chart path is missing at {{ gravitino_iceberg_rest_chart_path }}.
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool

- name: Copy Gravitino MySQL schema SQL file
  ansible.builtin.copy:
    src: "{{ gravitino_metadata_mysql_schema_sql_file }}"
    dest: /root/gravitino-schema-mysql.sql
    mode: "0600"
  when:
  - inventory_hostname == first_cp
  - gravitino_metadata_mysql_enabled | bool

- name: Copy Gravitino Iceberg metrics MySQL schema SQL file
  ansible.builtin.copy:
    src: "{{ gravitino_metadata_mysql_iceberg_metrics_schema_sql_file }}"
    dest: /root/gravitino-iceberg-metrics-schema-mysql.sql
    mode: "0600"
  when:
  - inventory_hostname == first_cp
  - gravitino_metadata_mysql_enabled | bool

- name: Apply Gravitino MySQL schema SQL
  ansible.builtin.shell: |
    set -euo pipefail
    cat /root/gravitino-schema-mysql.sql | \
      kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_metadata_mysql_namespace }} \
      exec -i {{ gravitino_metadata_mysql_name }}-0 -- \
      mysql -uroot -p{{ gravitino_metadata_mysql_root_password }} \
      -D {{ gravitino_metadata_mysql_gravitino_database }}
  args:
    executable: /bin/bash
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - gravitino_metadata_mysql_enabled | bool

- name: Apply Gravitino Iceberg metrics MySQL schema SQL
  ansible.builtin.shell: |
    set -euo pipefail
    cat /root/gravitino-iceberg-metrics-schema-mysql.sql | \
      kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_metadata_mysql_namespace }} \
      exec -i {{ gravitino_metadata_mysql_name }}-0 -- \
      mysql -uroot -p{{ gravitino_metadata_mysql_root_password }} \
      -D {{ gravitino_metadata_mysql_iceberg_rest_database }}
  args:
    executable: /bin/bash
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - gravitino_metadata_mysql_enabled | bool

- name: Verify Gravitino metadata schema table exists
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_metadata_mysql_namespace }}
    exec {{ gravitino_metadata_mysql_name }}-0 --
    mysql -N -s -uroot -p{{ gravitino_metadata_mysql_root_password }}
    -D {{ gravitino_metadata_mysql_gravitino_database }}
    -e "SHOW TABLES LIKE 'metalake_meta';"
  register: gravitino_metadata_mysql_schema_check
  changed_when: false
  failed_when: gravitino_metadata_mysql_schema_check.stdout | trim != 'metalake_meta'
  when:
  - inventory_hostname == first_cp
  - gravitino_metadata_mysql_enabled | bool

- name: Verify Gravitino Iceberg REST metrics schema table exists
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_metadata_mysql_namespace }}
    exec {{ gravitino_metadata_mysql_name }}-0 --
    mysql -N -s -uroot -p{{ gravitino_metadata_mysql_root_password }}
    -D {{ gravitino_metadata_mysql_iceberg_rest_database }}
    -e "SHOW TABLES LIKE 'commit_metrics_report';"
  register: gravitino_metadata_mysql_iceberg_metrics_schema_check
  changed_when: false
  failed_when: gravitino_metadata_mysql_iceberg_metrics_schema_check.stdout | trim != 'commit_metrics_report'
  when:
  - inventory_hostname == first_cp
  - gravitino_metadata_mysql_enabled | bool

- name: Ensure Gravitino persistence storage class exists
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    get storageclass {{ gravitino_persistence_storage_class_name }}
  register: gravitino_storage_class_check
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - gravitino_persistence_enabled | bool
  - gravitino_persistence_auto_create_pvc | bool
  - gravitino_persistence_storage_class_name | trim | length > 0

- name: Render Gravitino persistence PVC manifest
  ansible.builtin.template:
    src: gravitino-storage-pvc.yaml.j2
    dest: /root/gravitino-storage-pvc.yaml
    mode: "0600"
  when:
  - inventory_hostname == first_cp
  - gravitino_persistence_enabled | bool
  - gravitino_persistence_auto_create_pvc | bool

- name: Apply Gravitino persistence PVC manifest
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    apply -f /root/gravitino-storage-pvc.yaml
  register: gravitino_persistence_pvc_apply
  changed_when: >-
    'created' in gravitino_persistence_pvc_apply.stdout
    or 'configured' in gravitino_persistence_pvc_apply.stdout
    or 'patched' in gravitino_persistence_pvc_apply.stdout
  when:
  - inventory_hostname == first_cp
  - gravitino_persistence_enabled | bool
  - gravitino_persistence_auto_create_pvc | bool

- name: Validate Gravitino Iceberg REST persistence settings
  ansible.builtin.assert:
    that:
    - gravitino_iceberg_rest_persistence_size | trim | length > 0
    - gravitino_iceberg_rest_persistence_access_modes | length > 0
    - gravitino_iceberg_rest_persistence_existing_claim | trim | length > 0
    fail_msg: Gravitino Iceberg REST persistence settings are incomplete.
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool
  - gravitino_iceberg_rest_persistence_enabled | bool

- name: Ensure Gravitino Iceberg REST persistence storage class exists
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    get storageclass {{ gravitino_iceberg_rest_persistence_storage_class_name }}
  register: gravitino_iceberg_rest_storage_class_check
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool
  - gravitino_iceberg_rest_persistence_enabled | bool
  - gravitino_iceberg_rest_persistence_auto_create_pvc | bool
  - gravitino_iceberg_rest_persistence_storage_class_name | trim | length > 0

- name: Render Gravitino Iceberg REST persistence PVC manifest
  ansible.builtin.template:
    src: gravitino-iceberg-rest-storage-pvc.yaml.j2
    dest: /root/gravitino-iceberg-rest-storage-pvc.yaml
    mode: "0600"
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool
  - gravitino_iceberg_rest_persistence_enabled | bool
  - gravitino_iceberg_rest_persistence_auto_create_pvc | bool

- name: Apply Gravitino Iceberg REST persistence PVC manifest
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    apply -f /root/gravitino-iceberg-rest-storage-pvc.yaml
  register: gravitino_iceberg_rest_persistence_pvc_apply
  changed_when: >-
    'created' in gravitino_iceberg_rest_persistence_pvc_apply.stdout
    or 'configured' in gravitino_iceberg_rest_persistence_pvc_apply.stdout
    or 'patched' in gravitino_iceberg_rest_persistence_pvc_apply.stdout
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool
  - gravitino_iceberg_rest_persistence_enabled | bool
  - gravitino_iceberg_rest_persistence_auto_create_pvc | bool

- name: Update Gravitino chart dependencies
  ansible.builtin.command: >-
    helm dependency update {{ gravitino_chart_path }}
  register: gravitino_chart_dependencies
  changed_when: >-
    'Saving' in gravitino_chart_dependencies.stdout
    or 'Downloading' in gravitino_chart_dependencies.stdout
    or 'Deleting outdated charts' in gravitino_chart_dependencies.stdout
  when:
  - inventory_hostname == first_cp
  - gravitino_chart_update_dependencies | bool

- name: Update Gravitino Iceberg REST chart dependencies
  ansible.builtin.command: >-
    helm dependency update {{ gravitino_iceberg_rest_chart_path }}
  register: gravitino_iceberg_rest_chart_dependencies
  changed_when: >-
    'Saving' in gravitino_iceberg_rest_chart_dependencies.stdout
    or 'Downloading' in gravitino_iceberg_rest_chart_dependencies.stdout
    or 'Deleting outdated charts' in gravitino_iceberg_rest_chart_dependencies.stdout
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool
  - gravitino_chart_update_dependencies | bool

- name: Render Gravitino values file
  ansible.builtin.template:
    src: gravitino-values.yaml.j2
    dest: /root/gravitino-values.yaml
    mode: "0600"
  when: inventory_hostname == first_cp

- name: Install or upgrade Gravitino
  ansible.builtin.command: >-
    helm upgrade --install {{ gravitino_release_name }} {{ gravitino_chart_path }}
    --namespace {{ gravitino_namespace }}
    --create-namespace
    {{ '--reset-values' if gravitino_helm_reset_values | bool else '' }}
    -f /root/gravitino-values.yaml
    --wait
    --timeout {{ gravitino_helm_timeout }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: gravitino_install
  changed_when: >-
    'has been installed' in gravitino_install.stdout
    or 'has been upgraded' in gravitino_install.stdout
  when: inventory_hostname == first_cp

- name: Detect Gravitino deployment resource
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_namespace }}
    get deployment
    -l app=gravitino,release={{ gravitino_release_name }}
    -o jsonpath={.items[0].metadata.name}
  register: gravitino_deployment_name
  changed_when: false
  failed_when: gravitino_deployment_name.stdout | trim | length == 0
  when: inventory_hostname == first_cp

- name: Wait for Gravitino deployment rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_namespace }}
    rollout status deployment/{{ gravitino_deployment_name.stdout | trim }}
    --timeout={{ gravitino_rollout_timeout }}
  register: gravitino_rollout
  changed_when: false
  when: inventory_hostname == first_cp

- name: Render Gravitino MinIO bucket bootstrap job manifest
  ansible.builtin.template:
    src: gravitino-minio-bucket-job.yaml.j2
    dest: /root/gravitino-minio-bucket-job.yaml
    mode: "0600"
  when:
  - inventory_hostname == first_cp
  - gravitino_minio_enabled | bool
  - gravitino_minio_auto_create_bucket | bool

- name: Delete existing Gravitino MinIO bucket bootstrap job
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_namespace }}
    delete job/{{ gravitino_minio_bucket_job_name }} --ignore-not-found=true
  register: gravitino_minio_bucket_job_delete
  changed_when: "'deleted' in gravitino_minio_bucket_job_delete.stdout"
  when:
  - inventory_hostname == first_cp
  - gravitino_minio_enabled | bool
  - gravitino_minio_auto_create_bucket | bool

- name: Apply Gravitino MinIO bucket bootstrap job
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    apply -f /root/gravitino-minio-bucket-job.yaml
  register: gravitino_minio_bucket_job_apply
  changed_when: >-
    'created' in gravitino_minio_bucket_job_apply.stdout
    or 'configured' in gravitino_minio_bucket_job_apply.stdout
    or 'patched' in gravitino_minio_bucket_job_apply.stdout
  when:
  - inventory_hostname == first_cp
  - gravitino_minio_enabled | bool
  - gravitino_minio_auto_create_bucket | bool

- name: Wait for Gravitino MinIO bucket bootstrap job to complete
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_namespace }}
    wait --for=condition=complete job/{{ gravitino_minio_bucket_job_name }}
    --timeout={{ gravitino_minio_bucket_job_timeout }}
  register: gravitino_minio_bucket_job_wait
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - gravitino_minio_enabled | bool
  - gravitino_minio_auto_create_bucket | bool

- name: Render Gravitino Iceberg REST values file
  ansible.builtin.template:
    src: gravitino-iceberg-rest-values.yaml.j2
    dest: /root/gravitino-iceberg-rest-values.yaml
    mode: "0600"
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool

- name: Install or upgrade Gravitino Iceberg REST Catalog Server
  ansible.builtin.command: >-
    helm upgrade --install {{ gravitino_iceberg_rest_release_name }} {{ gravitino_iceberg_rest_chart_path }}
    --namespace {{ gravitino_iceberg_rest_namespace }}
    --create-namespace
    {{ '--reset-values' if gravitino_iceberg_rest_helm_reset_values | bool else '' }}
    -f /root/gravitino-iceberg-rest-values.yaml
    --wait
    --timeout {{ gravitino_iceberg_rest_helm_timeout }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: gravitino_iceberg_rest_install
  changed_when: >-
    'has been installed' in gravitino_iceberg_rest_install.stdout
    or 'has been upgraded' in gravitino_iceberg_rest_install.stdout
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool

- name: Detect Gravitino Iceberg REST deployment resource
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_iceberg_rest_namespace }}
    get deployment
    -l app.kubernetes.io/instance={{ gravitino_iceberg_rest_release_name }},app.kubernetes.io/name=gravitino-iceberg-rest-server
    -o jsonpath={.items[*].metadata.name}
  register: gravitino_iceberg_rest_deployment_name
  changed_when: false
  failed_when: >-
    gravitino_iceberg_rest_deployment_name.rc != 0
    or gravitino_iceberg_rest_deployment_name.stdout | trim | length == 0
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool

- name: Wait for Gravitino Iceberg REST deployment rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_iceberg_rest_namespace }}
    rollout status deployment/{{ (gravitino_iceberg_rest_deployment_name.stdout | trim).split(' ') | first }}
    --timeout={{ gravitino_iceberg_rest_rollout_timeout }}
  register: gravitino_iceberg_rest_rollout
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool

- name: Show Gravitino services
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_namespace }}
    get svc -o wide
  register: gravitino_services
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show Gravitino service output
  ansible.builtin.debug:
    var: gravitino_services.stdout_lines
  when: inventory_hostname == first_cp

- name: Show Gravitino pods
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_namespace }}
    get pods -o wide
  register: gravitino_pods
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show Gravitino pod output
  ansible.builtin.debug:
    var: gravitino_pods.stdout_lines
  when: inventory_hostname == first_cp

- name: Show Gravitino ingress resources
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_namespace }}
    get ingress -o wide
  register: gravitino_ingress
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - gravitino_ingress_enabled | bool

- name: Show Gravitino ingress output
  ansible.builtin.debug:
    var: gravitino_ingress.stdout_lines
  when:
  - inventory_hostname == first_cp
  - gravitino_ingress_enabled | bool

- name: Show Gravitino Iceberg REST services
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_iceberg_rest_namespace }}
    get svc -o wide
  register: gravitino_iceberg_rest_services
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool

- name: Show Gravitino Iceberg REST service output
  ansible.builtin.debug:
    var: gravitino_iceberg_rest_services.stdout_lines
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool

- name: Show Gravitino Iceberg REST pods
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_iceberg_rest_namespace }}
    get pods -o wide
  register: gravitino_iceberg_rest_pods
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool

- name: Show Gravitino Iceberg REST pod output
  ansible.builtin.debug:
    var: gravitino_iceberg_rest_pods.stdout_lines
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool

- name: Show Gravitino Iceberg REST ingress resources
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ gravitino_iceberg_rest_namespace }}
    get ingress -o wide
  register: gravitino_iceberg_rest_ingress
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool
  - gravitino_iceberg_rest_ingress_enabled | bool

- name: Show Gravitino Iceberg REST ingress output
  ansible.builtin.debug:
    var: gravitino_iceberg_rest_ingress.stdout_lines
  when:
  - inventory_hostname == first_cp
  - gravitino_iceberg_rest_server_enabled | bool
  - gravitino_iceberg_rest_ingress_enabled | bool
