- name: Ensure helm is available
  ansible.builtin.command: helm version --short
  register: flink_operator_helm_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Ensure kubectl is available
  ansible.builtin.command: kubectl version --client
  register: flink_operator_kubectl_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Add or update Flink operator Helm repository
  ansible.builtin.command: >-
    helm repo add {{ flink_operator_repo_name }} {{ flink_operator_repo_url }} --force-update
  register: flink_operator_repo_add
  changed_when: >-
    'has been added' in flink_operator_repo_add.stdout
    or 'has been updated' in flink_operator_repo_add.stdout
  when: inventory_hostname == first_cp

- name: Update Helm repository index for Flink operator chart
  ansible.builtin.command: helm repo update {{ flink_operator_repo_name }}
  register: flink_operator_repo_update
  changed_when: false
  when: inventory_hostname == first_cp

- name: Render Flink operator values file
  ansible.builtin.template:
    src: flink-operator-values.yaml.j2
    dest: /root/flink-operator-values.yaml
    mode: "0600"
  when: inventory_hostname == first_cp

- name: Install or upgrade Flink operator
  ansible.builtin.command: >-
    helm upgrade --install {{ flink_operator_release_name }} {{ flink_operator_chart_ref }}
    --namespace {{ flink_operator_namespace }}
    --create-namespace
    --version {{ flink_operator_chart_version }}
    -f /root/flink-operator-values.yaml
    --wait
    --timeout {{ flink_operator_helm_timeout }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: flink_operator_install
  changed_when: >-
    'has been installed' in flink_operator_install.stdout
    or 'has been upgraded' in flink_operator_install.stdout
  when: inventory_hostname == first_cp

- name: Wait for Flink operator CRDs
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    wait --for=condition=Established
    crd/flinkdeployments.flink.apache.org
    crd/flinksessionjobs.flink.apache.org
    crd/flinkstatesnapshots.flink.apache.org
    --timeout={{ flink_operator_crd_wait_timeout }}
  register: flink_operator_crd_wait
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - flink_operator_wait_for_crds

- name: Wait for Flink operator deployment rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ flink_operator_namespace }}
    rollout status deployment/{{ flink_operator_deployment_name }}
    --timeout={{ flink_operator_rollout_timeout }}
  register: flink_operator_rollout
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show Flink operator pods
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ flink_operator_namespace }}
    get pods -o wide
  register: flink_operator_pods
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show Flink operator pod output
  ansible.builtin.debug:
    var: flink_operator_pods.stdout_lines
  when: inventory_hostname == first_cp
