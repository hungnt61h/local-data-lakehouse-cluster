- name: Install base tools and configure OS
  ansible.builtin.dnf:
    name:
    - curl
    - wget
    - jq
    - tar
    - unzip
    - chrony
    - iproute
    - iptables
    - ebtables
    - ethtool
    - socat
    - conntrack-tools
    - nfs-utils
    - openssl
    - helm
    state: present

- name: Enable and start chronyd
  ansible.builtin.service:
    name: chronyd
    state: started
    enabled: true

- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Comment out swap in /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(\s*[^#]\S+\s+\S+\s+swap\s+\S+.*)$'
    replace: '# \1'

- name: Force SELinux permissive instantly
  ansible.builtin.command: setenforce 0
  changed_when: false

- name: Set SELinux permissive permanently
  ansible.posix.selinux:
    policy: targeted
    state: permissive