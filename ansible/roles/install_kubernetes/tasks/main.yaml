- name: Load kernel modules for Kubernetes
  ansible.builtin.copy:
    src: modules-load.d_k8s.conf
    dest: /etc/modules-load.d/k8s.conf

- name: Ensure kernel modules are loaded
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Set sysctl params for Kubernetes networking
  ansible.builtin.copy:
    src: sysctl.d_k8s.conf
    dest: /etc/sysctl.d/k8s.conf

- name: Apply sysctl
  ansible.builtin.command: sysctl --system
  changed_when: false

# --- containerd install ---
- name: Add Docker repo
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/centos/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo
    mode: "0644"

- name: Install containerd
  ansible.builtin.dnf:
    name: containerd.io
    state: present

- name: Create containerd config directory
  ansible.builtin.file:
    path: "{{ containerd_config_path }}"
    state: directory
    mode: "0755"

- name: Write containerd config.toml
  ansible.builtin.template:
    dest: "{{ containerd_config_path }}/config.toml"
    src: containerd_config.toml.j2
    mode: "0644"

- name: Enable and restart containerd
  ansible.builtin.service:
    name: containerd
    state: restarted
    enabled: true

# --- Kubernetes repo + kubeadm/kubelet/kubectl ---
- name: Add Kubernetes yum repo
  ansible.builtin.template:
    dest: /etc/yum.repos.d/kubernetes.repo
    src: "kubernetes.repo.j2"
    mode: "0644"

- name: Install kubelet, kubeadm, kubectl
  ansible.builtin.dnf:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    disable_excludes: kubernetes

- name: Enable kubelet (do not start yet if cluster not init)
  ansible.builtin.service:
    name: kubelet
    enabled: true

