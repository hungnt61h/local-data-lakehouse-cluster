- name: Ensure helm is available
  ansible.builtin.command: helm version --short
  register: airflow_helm_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Ensure kubectl is available
  ansible.builtin.command: kubectl version --client
  register: airflow_kubectl_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Validate Airflow topology
  ansible.builtin.assert:
    that:
    - airflow_webserver_replicas | int >= 1
    - airflow_scheduler_replicas | int >= 1
    - airflow_workers_replicas | int >= 0
    - (airflow_workers_replicas | int >= 1) or (airflow_executor is not search('CeleryExecutor'))
    fail_msg: >-
      Invalid Airflow replica settings.
      webserver={{ airflow_webserver_replicas }},
      scheduler={{ airflow_scheduler_replicas }},
      workers={{ airflow_workers_replicas }}.
  when: inventory_hostname == first_cp

- name: Validate MinIO logs bucket settings
  ansible.builtin.assert:
    that:
    - airflow_minio_logs_bucket | trim | length > 0
    fail_msg: MinIO logs bucket name must not be empty.
  when:
  - inventory_hostname == first_cp

- name: Validate MinIO DAG bundle settings
  ansible.builtin.assert:
    that:
    - airflow_minio_dags_bucket | trim | length > 0
    fail_msg: >-
      Invalid DAG bundle settings.
      MinIO DAG bucket name must not be empty.
  when: inventory_hostname == first_cp

- name: Validate Airflow static PV/PVC settings
  ansible.builtin.assert:
    that:
    - airflow_storage_node | trim | length > 0
    - airflow_postgresql_storage_size | trim | length > 0
    fail_msg: Airflow static PV/PVC settings are incomplete.
  when:
  - inventory_hostname == first_cp
  - airflow_create_static_pv_pvc | bool

- name: Validate Airflow dynamic PostgreSQL storage settings
  ansible.builtin.assert:
    that:
    - airflow_postgresql_storage_class | trim | length > 0
    fail_msg: Airflow PostgreSQL dynamic storage class must not be empty.
  when:
  - inventory_hostname == first_cp
  - airflow_postgresql_enabled | bool
  - not airflow_create_static_pv_pvc | bool

- name: Ensure Airflow PostgreSQL storage class exists
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    get storageclass {{ airflow_postgresql_storage_class }}
  register: airflow_postgresql_storage_class_check
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - airflow_postgresql_enabled | bool
  - not airflow_create_static_pv_pvc | bool

- name: Ensure Airflow storage directories exist on selected node
  ansible.builtin.file:
    path: "{{ airflow_postgresql_storage_path }}"
    state: directory
    mode: "0755"
  when:
  - airflow_create_static_pv_pvc | bool
  - inventory_hostname == airflow_storage_node

- name: Ensure Airflow namespace exists
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    create namespace {{ airflow_namespace }}
  register: airflow_namespace_create
  failed_when: >-
    airflow_namespace_create.rc != 0
    and 'AlreadyExists' not in airflow_namespace_create.stderr
  changed_when: "'created' in airflow_namespace_create.stdout"
  when: inventory_hostname == first_cp

- name: Render Airflow PostgreSQL PV/PVC manifest
  ansible.builtin.template:
    src: airflow-storage-pv-pvc.yaml.j2
    dest: /root/airflow-storage-pv-pvc.yaml
    mode: "0600"
  when:
  - inventory_hostname == first_cp
  - airflow_create_static_pv_pvc | bool

- name: Apply Airflow PostgreSQL PV/PVC manifest
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    apply -f /root/airflow-storage-pv-pvc.yaml
  register: airflow_storage_apply
  changed_when: >-
    'created' in airflow_storage_apply.stdout
    or 'configured' in airflow_storage_apply.stdout
    or 'patched' in airflow_storage_apply.stdout
  when:
  - inventory_hostname == first_cp
  - airflow_create_static_pv_pvc | bool

- name: Wait for Airflow PostgreSQL PVC to bind
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ airflow_namespace }}
    wait --for=jsonpath={.status.phase}=Bound
    pvc/{{ airflow_postgresql_pvc_name }}
    --timeout=3m
  register: airflow_postgresql_pvc_bound
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - airflow_create_static_pv_pvc | bool

- name: Render MinIO bucket bootstrap job manifest for Airflow
  ansible.builtin.template:
    src: airflow-minio-buckets-job.yaml.j2
    dest: /root/airflow-minio-buckets-job.yaml
    mode: "0600"
  when:
  - inventory_hostname == first_cp
  - airflow_minio_auto_create_buckets | bool

- name: Delete existing Airflow MinIO bucket bootstrap job
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ airflow_namespace }}
    delete job/{{ airflow_minio_bucket_job_name }} --ignore-not-found=true
  register: airflow_bucket_job_delete
  changed_when: "'deleted' in airflow_bucket_job_delete.stdout"
  when:
  - inventory_hostname == first_cp
  - airflow_minio_auto_create_buckets | bool

- name: Apply Airflow MinIO bucket bootstrap job
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf
    apply -f /root/airflow-minio-buckets-job.yaml
  register: airflow_bucket_job_apply
  changed_when: >-
    'created' in airflow_bucket_job_apply.stdout
    or 'configured' in airflow_bucket_job_apply.stdout
    or 'patched' in airflow_bucket_job_apply.stdout
  when:
  - inventory_hostname == first_cp
  - airflow_minio_auto_create_buckets | bool

- name: Wait for Airflow MinIO bucket bootstrap job to complete
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ airflow_namespace }}
    wait --for=condition=complete job/{{ airflow_minio_bucket_job_name }}
    --timeout={{ airflow_minio_bucket_job_timeout }}
  register: airflow_bucket_job_wait
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - airflow_minio_auto_create_buckets | bool

- name: Add or update Airflow Helm repository
  ansible.builtin.command: >-
    helm repo add {{ airflow_repo_name }} {{ airflow_repo_url }} --force-update
  register: airflow_repo_add
  changed_when: >-
    'has been added' in airflow_repo_add.stdout
    or 'has been updated' in airflow_repo_add.stdout
  when: inventory_hostname == first_cp

- name: Update Helm repository index for Airflow chart
  ansible.builtin.command: helm repo update {{ airflow_repo_name }}
  register: airflow_repo_update
  changed_when: false
  when: inventory_hostname == first_cp

- name: Read current Airflow Helm release state
  ansible.builtin.command: >-
    helm list --namespace {{ airflow_namespace }}
    --filter ^{{ airflow_release_name }}$
    --output json
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: airflow_release_list_raw
  changed_when: false
  when: inventory_hostname == first_cp

- name: Determine current Airflow Helm release status
  ansible.builtin.set_fact:
    airflow_release_status: >-
      {{
        (
          (airflow_release_list_raw.stdout | from_json)[0].status | lower
        )
        if ((airflow_release_list_raw.stdout | from_json) | length > 0)
        else 'absent'
      }}
  when: inventory_hostname == first_cp

- name: Render Airflow values file
  ansible.builtin.template:
    src: airflow-values.yaml.j2
    dest: /root/airflow-values.yaml
    mode: "0600"
  when: inventory_hostname == first_cp

- name: Install or upgrade Airflow
  ansible.builtin.command: >-
    helm upgrade --install {{ airflow_release_name }} {{ airflow_chart_ref }}
    --namespace {{ airflow_namespace }}
    --create-namespace
    --version {{ airflow_chart_version }}
    {{ '--reset-values' if airflow_helm_reset_values | bool else '' }}
    -f /root/airflow-values.yaml
    --rollback-on-failure
    --wait
    --timeout {{ airflow_helm_timeout }}
    {{ '--wait-for-jobs' if airflow_helm_wait_for_jobs | bool else '' }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: airflow_install
  retries: "{{ airflow_helm_upgrade_retries }}"
  delay: "{{ airflow_helm_upgrade_delay }}"
  until: airflow_install.rc == 0
  changed_when: >-
    'has been installed' in airflow_install.stdout
    or 'has been upgraded' in airflow_install.stdout
  when: inventory_hostname == first_cp

- name: Wait for Airflow scheduler rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ airflow_namespace }}
    rollout status deployment/{{ airflow_release_name }}-scheduler
    --timeout={{ airflow_rollout_timeout }}
  register: airflow_scheduler_rollout
  changed_when: false
  when: inventory_hostname == first_cp

- name: Wait for Airflow API server rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ airflow_namespace }}
    rollout status deployment/{{ airflow_release_name }}-api-server
    --timeout={{ airflow_rollout_timeout }}
  register: airflow_api_server_rollout
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - airflow_api_server_enabled | bool

- name: Wait for Airflow DAG processor rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ airflow_namespace }}
    rollout status deployment/{{ airflow_release_name }}-dag-processor
    --timeout={{ airflow_rollout_timeout }}
  register: airflow_dag_processor_rollout
  changed_when: false
  when: inventory_hostname == first_cp

- name: Wait for Airflow worker rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ airflow_namespace }}
    rollout status deployment/{{ airflow_release_name }}-worker
    --timeout={{ airflow_rollout_timeout }}
  register: airflow_worker_rollout
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - airflow_executor is search('CeleryExecutor')

- name: Show Airflow pods
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ airflow_namespace }}
    get pods -o wide
  register: airflow_pods
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show Airflow pod output
  ansible.builtin.debug:
    var: airflow_pods.stdout_lines
  when: inventory_hostname == first_cp

- name: Show Airflow services
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ airflow_namespace }}
    get svc -o wide
  register: airflow_services
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show Airflow service output
  ansible.builtin.debug:
    var: airflow_services.stdout_lines
  when: inventory_hostname == first_cp

- name: Show Airflow ingress resources
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ airflow_namespace }}
    get ingress -o wide
  register: airflow_ingress
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show Airflow ingress output
  ansible.builtin.debug:
    var: airflow_ingress.stdout_lines
  when: inventory_hostname == first_cp
