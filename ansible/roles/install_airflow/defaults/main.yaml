airflow_release_name: airflow
airflow_namespace: airflow

airflow_repo_name: apache-airflow
airflow_repo_url: https://airflow.apache.org
airflow_chart_ref: "{{ airflow_repo_name }}/airflow"
# apache-airflow/airflow chart 1.19.0 ships Airflow 3.1.7.
airflow_chart_version: "1.19.0"

airflow_helm_timeout: 45m
airflow_rollout_timeout: 30m
airflow_helm_upgrade_retries: 4
airflow_helm_upgrade_delay: 20
airflow_helm_wait_for_jobs: true
airflow_helm_reset_values: true
airflow_migrate_database_use_helm_hooks: false
airflow_migrate_database_apply_custom_env: false
airflow_create_user_use_helm_hooks: false

airflow_image_repository: apache/airflow
airflow_image_tag: "3.1.7"
airflow_version: "3.1.7"

# KubernetesExecutor-only deployment.
airflow_executor: "KubernetesExecutor"

airflow_webserver_replicas: 1
airflow_scheduler_replicas: 2
airflow_workers_replicas: 0
airflow_dag_processor_replicas: 1

airflow_api_server_enabled: true
airflow_postgresql_enabled: true

# Dynamic provisioning is the default (recommended with local-path provisioner).
airflow_create_static_pv_pvc: false
airflow_storage_node: "{{ groups['workers'][0] if (groups['workers'] | length > 0) else first_cp }}"
airflow_pv_reclaim_policy: Retain

airflow_postgresql_storage_size: 5Gi
airflow_postgresql_storage_class: local-path
airflow_logs_storage_class: "{{ airflow_postgresql_storage_class }}"
airflow_postgresql_pv_name: airflow-postgresql-pv
airflow_postgresql_pvc_name: airflow-postgresql-pvc
airflow_postgresql_storage_path: /var/lib/airflow/storage/postgresql

airflow_create_user_enabled: true
airflow_admin_role: Admin
airflow_admin_username: admin
airflow_admin_password: admin
airflow_admin_first_name: Airflow
airflow_admin_last_name: Admin
airflow_admin_email: "admin@{{ domain }}"

airflow_ingress_enabled: true
airflow_ingress_class_name: "{{ haproxy_ingress_class_name | default('haproxy') }}"
airflow_ingress_host: "airflow.{{ domain }}"
airflow_ingress_path: /
airflow_ingress_path_type: Prefix
airflow_ingress_annotations: {}
airflow_ingress_tls_enabled: false
airflow_ingress_tls_secret_name: airflow-tls

airflow_minio_namespace: minio
airflow_minio_service_name: minio
airflow_minio_service_port: 9000
airflow_minio_endpoint_url: "http://{{ airflow_minio_service_name }}.{{ airflow_minio_namespace }}.svc.cluster.local:{{ airflow_minio_service_port }}"
airflow_minio_region: us-east-1
airflow_minio_access_key: minioadmin
airflow_minio_secret_key: minioadmin
airflow_minio_verify_tls: false

airflow_minio_connection_id: minio_s3
airflow_minio_connection_env: AIRFLOW_CONN_MINIO_S3
airflow_minio_connection_secret_name: "{{ airflow_release_name }}-minio-connection"
airflow_minio_connection_secret_key: connection

airflow_minio_dags_bucket: airflow-dags
airflow_minio_dags_prefix: dags
airflow_minio_logs_bucket: airflow-logs
airflow_minio_logs_prefix: logs
airflow_minio_auto_create_buckets: true
airflow_minio_bucket_job_name: "{{ airflow_release_name }}-minio-buckets"
airflow_minio_bucket_job_image: minio/mc:RELEASE.2025-07-21T05-28-08Z
airflow_minio_bucket_job_timeout: 8m

airflow_dags_persistence_enabled: false
airflow_logs_persistence_enabled: false
