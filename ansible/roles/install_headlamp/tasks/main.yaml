- name: Ensure helm is available
  ansible.builtin.command: helm version --short
  register: helm_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Ensure kubectl is available
  ansible.builtin.command: kubectl version --client
  register: kubectl_version
  changed_when: false
  when: inventory_hostname == first_cp

- name: Add or update Headlamp Helm repository
  ansible.builtin.command: >-
    helm repo add {{ headlamp_repo_name }} {{ headlamp_repo_url }} --force-update
  register: headlamp_repo_add
  changed_when: >-
    'has been added' in headlamp_repo_add.stdout
    or 'has been updated' in headlamp_repo_add.stdout
  when: inventory_hostname == first_cp

- name: Update Helm repository index
  ansible.builtin.command: helm repo update {{ headlamp_repo_name }}
  register: headlamp_repo_update
  changed_when: false
  when: inventory_hostname == first_cp

- name: Render Headlamp values file
  ansible.builtin.template:
    src: headlamp-values.yaml.j2
    dest: /root/headlamp-values.yaml
    mode: "0600"
  when: inventory_hostname == first_cp

- name: Install or upgrade Headlamp
  ansible.builtin.command: >-
    helm upgrade --install {{ headlamp_release_name }} {{ headlamp_chart_ref }}
    --namespace {{ headlamp_namespace }}
    --create-namespace
    -f /root/headlamp-values.yaml
    --wait
    --timeout {{ headlamp_helm_timeout }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: headlamp_install
  changed_when: >-
    'has been installed' in headlamp_install.stdout
    or 'has been upgraded' in headlamp_install.stdout
  when: inventory_hostname == first_cp

- name: Wait for Headlamp deployment rollout
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ headlamp_namespace }}
    rollout status deployment/{{ headlamp_release_name }} --timeout=10m
  register: headlamp_rollout
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show Headlamp service details
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ headlamp_namespace }}
    get svc {{ headlamp_release_name }} -o wide
  register: headlamp_service
  changed_when: false
  when: inventory_hostname == first_cp

- name: Show Headlamp service output
  ansible.builtin.debug:
    var: headlamp_service.stdout_lines
  when: inventory_hostname == first_cp

- name: Show Headlamp ingress details
  ansible.builtin.command: >-
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ headlamp_namespace }}
    get ingress -l app.kubernetes.io/instance={{ headlamp_release_name }} -o wide
  register: headlamp_ingress
  changed_when: false
  when:
  - inventory_hostname == first_cp
  - headlamp_ingress_enabled

- name: Show Headlamp ingress output
  ansible.builtin.debug:
    var: headlamp_ingress.stdout_lines
  when:
  - inventory_hostname == first_cp
  - headlamp_ingress_enabled
